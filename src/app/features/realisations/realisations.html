<!-- Page Hero -->
<section class="relative h-64 md:h-80 overflow-hidden">
  <img
    src="https://res.cloudinary.com/drknixj4y/image/upload/v1779653400/WhatsApp_Image_2026-05-24_at_8.49.17_PM_cg1zha.jpg"
    alt="Réalisations"
    class="w-full h-full object-cover"
  />
  <div class="absolute inset-0 bg-[#1a1612]/70"></div>
  <div class="absolute inset-0 flex flex-col items-center justify-center text-center">
    <div class="flex items-center gap-3 mb-4">
      <div class="w-8 h-px bg-[#c9a84c]"></div>
      <span class="text-[#c9a84c] text-xs tracking-[0.3em] uppercase font-medium">Portfolio</span>
      <div class="w-8 h-px bg-[#c9a84c]"></div>
    </div>
    <h1 class="font-serif text-4xl md:text-6xl text-[#f5f0e8]">Nos Réalisations</h1>
  </div>
</section>

<!-- Filters -->
<section class="bg-[#2a2118] py-8 sticky top-16 z-30 border-b border-[#f5f0e8]/10">
  <div class="max-w-7xl mx-auto px-6">
    <div class="flex flex-wrap gap-3 justify-center">
      @for (filter of filters; track filter) {
        <button
          (click)="setFilter(filter)"
          [class]="activeFilter() === filter
            ? 'px-6 py-2 bg-[#c9a84c] text-[#1a1612] text-xs tracking-widest uppercase font-semibold transition-all duration-300'
            : 'px-6 py-2 border border-[#f5f0e8]/20 text-[#f5f0e8]/60 text-xs tracking-widest uppercase font-medium hover:border-[#c9a84c] hover:text-[#c9a84c] transition-all duration-300'"
        >
          {{ filter }}
        </button>
      }
    </div>
  </div>
</section>

<!-- Projects Grid -->
<section class="py-16 bg-[#1a1612]">
  <div class="max-w-7xl mx-auto px-6">
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      @for (project of filteredProjects; track project.title; let i = $index) {
        <div
          appReveal
          [revealDelay]="i * 80"
          class="group relative overflow-hidden cursor-pointer"
        >
          <img
            [src]="project.image"
            [alt]="project.title"
            class="w-full h-72 object-cover group-hover:scale-110 transition-transform duration-700"
            loading="lazy"
          />
          <div class="absolute inset-0 bg-gradient-to-t from-[#1a1612] via-[#1a1612]/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
          <div class="absolute bottom-0 left-0 right-0 p-6 translate-y-4 group-hover:translate-y-0 opacity-0 group-hover:opacity-100 transition-all duration-500">
            <p class="text-[#c9a84c] text-xs tracking-widest uppercase mb-1">{{ project.category }} · {{ project.year }}</p>
            <h3 class="font-serif text-xl text-[#f5f0e8]">{{ project.title }}</h3>
          </div>
          <!-- Category badge always visible -->
          <div class="absolute top-4 left-4 bg-[#1a1612]/80 backdrop-blur-sm px-3 py-1">
            <span class="text-[#c9a84c] text-xs tracking-widest uppercase">{{ project.category }}</span>
          </div>
        </div>
      }
    </div>
  </div>
</section>
