<section class="py-24 bg-[#2a2118]">
  <div class="max-w-7xl mx-auto px-6">

    <!-- Header -->
    <div class="text-center mb-16" appReveal>
      <div class="flex items-center justify-center gap-3 mb-4">
        <div class="w-8 h-px bg-[#c9a84c]"></div>
        <span class="text-[#c9a84c] text-xs tracking-[0.3em] uppercase font-medium">Témoignages</span>
        <div class="w-8 h-px bg-[#c9a84c]"></div>
      </div>
      <h2 class="font-serif text-4xl md:text-5xl text-[#f5f0e8] leading-tight">
        Ce que disent<br>nos clients
      </h2>
    </div>

    <!-- Testimonials -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
      @for (t of testimonials; track t.name; let i = $index) {
        <div
          appReveal
          [revealDelay]="i * 150"
          class="bg-[#1a1612] p-8 border border-[#f5f0e8]/5 hover:border-[#c9a84c]/30 transition-all duration-500 group"
        >
          <!-- Stars -->
          <div class="flex gap-1 mb-6">
            @for (star of [1,2,3,4,5]; track star) {
              <svg class="w-4 h-4 text-[#c9a84c]" fill="currentColor" viewBox="0 0 20 20">
                <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/>
              </svg>
            }
          </div>

          <!-- Quote -->
          <p class="text-[#f5f0e8]/60 text-sm leading-relaxed mb-8 italic">
            "{{ t.text }}"
          </p>

          <!-- Author -->
          <div class="flex items-center gap-4">
            <img
              [src]="t.avatar"
              [alt]="t.name"
              class="w-12 h-12 rounded-full object-cover border border-[#c9a84c]/30"
              loading="lazy"
            />
            <div>
              <p class="text-[#f5f0e8] font-medium text-sm">{{ t.name }}</p>
              <p class="text-[#c9a84c] text-xs tracking-wider">{{ t.role }}</p>
            </div>
          </div>
        </div>
      }
    </div>

    <!-- CTA -->
    <div class="text-center mt-12" appReveal>
      <a
        routerLink="/temoignages"
        class="inline-flex items-center gap-3 px-8 py-3 border border-[#c9a84c]/40 text-[#c9a84c] text-sm tracking-widest uppercase font-medium hover:bg-[#c9a84c] hover:text-[#1a1612] transition-all duration-300"
      >
        Tous les témoignages
      </a>
    </div>
  </div>
</section>
