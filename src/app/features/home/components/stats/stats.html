<section class="bg-[#2a2118] py-16 border-y border-[#c9a84c]/10">
  <div class="max-w-7xl mx-auto px-6">
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-8 sm:gap-0 sm:divide-x sm:divide-[#f5f0e8]/10 justify-items-center">
      @for (stat of stats; track stat.label; let i = $index) {
        <div
          appReveal
          [revealDelay]="i * 100"
          class="text-center lg:px-8"
        >
          <div class="font-serif text-4xl md:text-5xl text-[#c9a84c] font-bold mb-2">
            {{ stat.value }}{{ stat.suffix }}
          </div>
          <div class="text-[#f5f0e8]/50 text-sm tracking-widest uppercase">{{ stat.label }}</div>
        </div>
      }
    </div>
  </div>
</section>
