<section class="py-24 bg-[#1a1612]">
  <div class="max-w-7xl mx-auto px-6">

    <!-- Header -->
    <div class="text-center mb-16" appReveal>
      <div class="flex items-center justify-center gap-3 mb-4">
        <div class="w-8 h-px bg-[#c9a84c]"></div>
        <span class="text-[#c9a84c] text-xs tracking-[0.3em] uppercase font-medium">Nos réalisations</span>
        <div class="w-8 h-px bg-[#c9a84c]"></div>
      </div>
      <h2 class="font-serif text-4xl md:text-5xl text-[#f5f0e8] leading-tight">
        Shaping the future<br>of your interiors
      </h2>
    </div>

    <!-- Grid -->
    <div class="grid grid-cols-2 lg:grid-cols-3 gap-4">

      <!-- Large card with stat -->
      <div class="col-span-2 lg:col-span-1 row-span-1 lg:row-span-2 flex flex-col gap-4">
        <!-- Stat block -->
        <div appReveal class="bg-[#2a2118] p-8 flex flex-col justify-center">
          <div class="font-serif text-6xl text-[#f5f0e8] font-bold mb-2">+23</div>
          <div class="text-[#c9a84c] text-sm tracking-widest uppercase mb-4">Tailored Quality Solutions</div>
          <a
            routerLink="/realisations"
            class="inline-flex items-center gap-2 px-6 py-3 bg-[#c9a84c] text-[#1a1612] text-xs tracking-widest uppercase font-semibold hover:bg-[#b8963e] transition-all duration-300 self-start group"
          >
            Voir tout
            <svg class="w-3 h-3 group-hover:translate-x-1 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"/>
            </svg>
          </a>
        </div>
      </div>

      <!-- Project cards -->
      @for (project of projects; track project.title; let i = $index) {
        <div
          appReveal
          [revealDelay]="i * 100"
          class="relative overflow-hidden group cursor-pointer"
        >
          <img
            [src]="project.image"
            [alt]="project.title"
            class="w-full h-48 object-cover group-hover:scale-110 transition-transform duration-700"
            loading="lazy"
          />
          <div class="absolute inset-0 bg-gradient-to-t from-[#1a1612]/80 to-transparent"></div>
          <!-- Count badge -->
          <div class="absolute top-3 left-3 bg-[#c9a84c] text-[#1a1612] text-xs font-bold px-2 py-1">
            {{ project.count }}+
          </div>
          <!-- Info -->
          <div class="absolute bottom-0 left-0 right-0 p-4">
            <p class="text-[#c9a84c] text-xs tracking-widest uppercase mb-1">{{ project.category }}</p>
            <p class="text-[#f5f0e8] font-serif text-lg">{{ project.title }}</p>
          </div>
        </div>
      }
    </div>
  </div>
</section>
