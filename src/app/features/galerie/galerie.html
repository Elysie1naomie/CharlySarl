<!-- Hero -->
<section class="relative h-64 md:h-80 overflow-hidden">
  <img
    src="https://res.cloudinary.com/drknixj4y/image/upload/v1779653412/WhatsApp_Image_2026-05-24_at_8.50.41_PM_bwed14.jpg"
    alt="Galerie"
    class="w-full h-full object-cover"
  />
  <div class="absolute inset-0 bg-[#1a1612]/70"></div>
  <div class="absolute inset-0 flex flex-col items-center justify-center text-center">
    <div class="flex items-center gap-3 mb-4">
      <div class="w-8 h-px bg-[#c9a84c]"></div>
      <span class="text-[#c9a84c] text-xs tracking-[0.3em] uppercase font-medium">Inspirations</span>
      <div class="w-8 h-px bg-[#c9a84c]"></div>
    </div>
    <h1 class="font-serif text-4xl md:text-6xl text-[#f5f0e8]">Galerie</h1>
  </div>
</section>

<!-- Gallery Grid -->
<section class="py-16 bg-[#1a1612]">
  <div class="max-w-7xl mx-auto px-6">
    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3 auto-rows-[200px]">
      @for (image of images; track image.src; let i = $index) {
        <div
          appReveal
          [revealDelay]="i * 60"
          class="overflow-hidden cursor-pointer group relative"
          [ngClass]="image.span"
          (click)="openLightbox(i)"
          (keydown.enter)="openLightbox(i)"
          tabindex="0"
          [attr.aria-label]="'Voir ' + image.alt"
          role="button"
        >
          <img
            [src]="image.src"
            [alt]="image.alt"
            class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700"
            loading="lazy"
          />
          <div class="absolute inset-0 bg-[#1a1612]/0 group-hover:bg-[#1a1612]/40 transition-all duration-500 flex items-center justify-center">
            <svg class="w-8 h-8 text-white opacity-0 group-hover:opacity-100 transition-opacity duration-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 0v3m0-3h3m-3 0H7"/>
            </svg>
          </div>
        </div>
      }
    </div>
  </div>
</section>

<!-- Lightbox -->
@if (lightboxOpen()) {
  <div
    class="fixed inset-0 z-[100] bg-black/95 flex items-center justify-center"
    (click)="closeLightbox()"
  >
    <!-- Close -->
    <button
      class="absolute top-6 right-6 text-white/60 hover:text-white transition-colors duration-300 z-10"
      (click)="closeLightbox()"
      aria-label="Fermer"
    >
      <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </button>

    <!-- Prev -->
    <button
      class="absolute left-6 text-white/60 hover:text-white transition-colors duration-300 z-10"
      (click)="$event.stopPropagation(); prevImage()"
      aria-label="Image précédente"
    >
      <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 19l-7-7 7-7"/>
      </svg>
    </button>

    <!-- Image -->
    <img
      [src]="images[lightboxIndex()].src"
      [alt]="images[lightboxIndex()].alt"
      class="max-w-[90vw] max-h-[85vh] object-contain"
      (click)="$event.stopPropagation()"
    />

    <!-- Next -->
    <button
      class="absolute right-6 text-white/60 hover:text-white transition-colors duration-300 z-10"
      (click)="$event.stopPropagation(); nextImage()"
      aria-label="Image suivante"
    >
      <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5l7 7-7 7"/>
      </svg>
    </button>

    <!-- Counter -->
    <div class="absolute bottom-6 left-1/2 -translate-x-1/2 text-white/40 text-sm">
      {{ lightboxIndex() + 1 }} / {{ images.length }}
    </div>
  </div>
}
