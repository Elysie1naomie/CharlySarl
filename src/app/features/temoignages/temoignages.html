<!-- Hero -->
<section class="relative h-64 md:h-80 overflow-hidden">
  <img
    src="https://res.cloudinary.com/drknixj4y/image/upload/v1779653411/WhatsApp_Image_2026-05-24_at_8.51.47_PM_g339bw.jpg"
    alt="Témoignages"
    class="w-full h-full object-cover"
  />
  <div class="absolute inset-0 bg-[#1a1612]/70"></div>
  <div class="absolute inset-0 flex flex-col items-center justify-center text-center">
    <div class="flex items-center gap-3 mb-4">
      <div class="w-8 h-px bg-[#c9a84c]"></div>
      <span class="text-[#c9a84c] text-xs tracking-[0.3em] uppercase font-medium">Ils nous font confiance</span>
      <div class="w-8 h-px bg-[#c9a84c]"></div>
    </div>
    <h1 class="font-serif text-4xl md:text-6xl text-[#f5f0e8]">Témoignages</h1>
  </div>
</section>

<!-- Testimonials -->
<section class="py-16 bg-[#1a1612]">
  <div class="max-w-7xl mx-auto px-6">
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      @for (t of testimonials; track t.name; let i = $index) {
        <div
          appReveal
          [revealDelay]="i * 100"
          class="bg-[#2a2118] p-8 border border-[#f5f0e8]/5 hover:border-[#c9a84c]/30 transition-all duration-500 flex flex-col"
        >
          <!-- Stars -->
          <div class="flex gap-1 mb-6">
            @for (star of [1,2,3,4,5]; track star) {
              <svg class="w-4 h-4 text-[#c9a84c]" fill="currentColor" viewBox="0 0 20 20">
                <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/>
              </svg>
            }
          </div>

          <!-- Quote -->
          <p class="text-[#f5f0e8]/60 text-sm leading-relaxed mb-6 italic flex-1">
            "{{ t.text }}"
          </p>

          <!-- Project tag -->
          <div class="mb-6">
            <span class="text-[#c9a84c] text-xs tracking-widest uppercase border border-[#c9a84c]/30 px-3 py-1">{{ t.project }}</span>
          </div>

          <!-- Author -->
          <div class="flex items-center gap-4 pt-6 border-t border-[#f5f0e8]/10">
            <img
              [src]="t.avatar"
              [alt]="t.name"
              class="w-12 h-12 rounded-full object-cover border border-[#c9a84c]/30"
              loading="lazy"
            />
            <div>
              <p class="text-[#f5f0e8] font-medium text-sm">{{ t.name }}</p>
              <p class="text-[#c9a84c] text-xs tracking-wider">{{ t.role }}</p>
            </div>
          </div>
        </div>
      }
    </div>
  </div>
</section>
